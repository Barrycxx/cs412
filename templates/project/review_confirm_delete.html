{% extends 'project/base.html' %}

{% block content %}
<h2 class="page-title">Delete Review</h2>
<p class="section-intro">
    Confirm whether you want to remove this review.
</p>

<div class="detail-box">
    <p>Are you sure you want to delete this review?</p>
    <p><strong>{{ review.user_profile.username }} - {{ review.game.title }}</strong></p>

    <div class="action-row">
        <form method="post">
            {% csrf_token %}
            <button type="submit">Yes, Delete</button>
        </form>
        <a class="btn btn-secondary" href="{% url 'project:review_list' %}">Cancel</a>
    </div>
</div>
{% endblock %}
