<!DOCTYPE html>
<html>
<head>
    <title>All Pictures</title>
</head>
<body>
    <h1>All Pictures</h1>

    {% if pictures %}
        {% for picture in pictures %}
            <div>
                <p><strong>ID:</strong> {{ picture.pk }}</p>
                <p><strong>Contributor:</strong> {{ picture.contributor }}</p>
                <p><strong>URL:</strong> {{ picture.image_url }}</p>
                <img src="{{ picture.image_url }}" alt="Picture" width="300">
                <p><a href="{% url 'show_picture' picture.pk %}">View This Picture</a></p>
            </div>
            <hr>
        {% endfor %}
    {% else %}
        <p>No pictures found.</p>
    {% endif %}

    <p><a href="{% url 'show_random' %}">Back to Random Page</a></p>
</body>
</html>
