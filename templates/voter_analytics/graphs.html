<!DOCTYPE html>
<html>
<head>
    <title>Voter Graphs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #d9e6f2;
            margin: 0;
            padding: 0;
        }

        .nav {
            text-align: center;
            padding: 20px;
            background-color: #c6d9f1;
        }

        .nav a {
            margin: 0 15px;
            font-weight: bold;
            color: #1f3a93;
            text-decoration: none;
        }

        .container {
            width: 85%;
            margin: 20px auto;
            background-color: #c6d9f1;
            padding: 25px;
            border-radius: 15px;
        }

        h1, h2 {
            text-align: center;
            color: #1f3a93;
        }

        .form-row {
            margin-bottom: 12px;
        }

        .buttons {
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="{% url 'voters' %}">Home</a>
        <a href="{% url 'voters' %}">Show Voter List</a>
        <a href="{% url 'graphs' %}">Show Graphs</a>
    </div>

    <div class="container">
        <h1>Voter Graphs</h1>

        <form method="get">
            <div class="form-row">
                <label>Party Affiliation:</label>
                <select name="party">
                    <option value="">All</option>
                    {% for party in parties %}
                        <option value="{{ party }}" {% if selected_party == party %}selected{% endif %}>
                            {{ party }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-row">
                <label>Minimum Year of Birth:</label>
                <select name="min_year">
                    <option value="">Any</option>
                    {% for year in years %}
                        <option value="{{ year }}" {% if selected_min_year == year|stringformat:"s" %}selected{% endif %}>
                            {{ year }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-row">
                <label>Maximum Year of Birth:</label>
                <select name="max_year">
                    <option value="">Any</option>
                    {% for year in years %}
                        <option value="{{ year }}" {% if selected_max_year == year|stringformat:"s" %}selected{% endif %}>
                            {{ year }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-row">
                <label>Voter Score:</label>
                <select name="voter_score">
                    <option value="">Any</option>
                    <option value="0" {% if selected_voter_score == "0" %}selected{% endif %}>0</option>
                    <option value="1" {% if selected_voter_score == "1" %}selected{% endif %}>1</option>
                    <option value="2" {% if selected_voter_score == "2" %}selected{% endif %}>2</option>
                    <option value="3" {% if selected_voter_score == "3" %}selected{% endif %}>3</option>
                    <option value="4" {% if selected_voter_score == "4" %}selected{% endif %}>4</option>
                    <option value="5" {% if selected_voter_score == "5" %}selected{% endif %}>5</option>
                </select>
            </div>

            <div class="form-row">
                <label><input type="checkbox" name="v20state" {% if checked_v20state %}checked{% endif %}> v20state</label>
                <label><input type="checkbox" name="v21town" {% if checked_v21town %}checked{% endif %}> v21town</label>
                <label><input type="checkbox" name="v21primary" {% if checked_v21primary %}checked{% endif %}> v21primary</label>
                <label><input type="checkbox" name="v22general" {% if checked_v22general %}checked{% endif %}> v22general</label>
                <label><input type="checkbox" name="v23town" {% if checked_v23town %}checked{% endif %}> v23town</label>
            </div>

            <div class="buttons">
                <button type="submit">Filter</button>
                <a href="{% url 'graphs' %}">Clear</a>
            </div>
        </form>

        <h2>{{ result_count }} voters matched the filters</h2>

        <div>
            {{ birth_year_graph|safe }}
        </div>

        <div>
            {{ party_graph|safe }}
        </div>

        <div>
            {{ election_graph|safe }}
        </div>
    </div>
</body>
</html>
