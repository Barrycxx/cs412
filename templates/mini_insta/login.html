{% extends "mini_insta/base.html" %}

{% block content %}

<h2 style="margin-top: 6px;">Login</h2>

<form method="POST" style="margin-top: 18px;">
  {% csrf_token %}

  <div style="margin-bottom: 14px;">
    {{ form.as_p }}
  </div>

  <input type="hidden" name="next" value="{{ request.GET.next|default:'/mini_insta/' }}">
  <button type="submit"
          style="padding: 10px 18px; border: 0; border-radius: 10px; background: #0095f6; color: white; font-weight: 600;">
    Login
  </button>
</form>

{% endblock %}
